name: desktop-build

# Build the Tauri desktop installers for Windows + Linux on every push to
# master that touches the desktop app, and upload them as workflow artifacts
# (downloadable from the Actions run page). No tag or Release required.
on:
  push:
    branches: [master]
    paths:
      - "apps/desktop/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: qiraa-desktop-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 90
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
