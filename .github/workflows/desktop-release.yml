name: desktop-release

# Build the Tauri desktop installers for Windows + Linux on every push to
# master that touches the desktop app, and publish them to a single rolling
# `desktop-latest` GitHub Release (always the newest build, no per-version
# tags). The Release page shows the installer assets. Also runnable by hand.
on:
  push:
    branches: [master]
    paths:
      - "apps/desktop/**"
      - "packages/shared/**"
      - ".github/workflows/desktop-release.yml"
  workflow_dispatch:

permissions:
  contents: write

# Only one rolling-release build at a time; a newer push wins.
concurrency:
  group: desktop-release
  cancel-in-progress: true

jobs:
  # Recreate the rolling release at the current commit so the build jobs have a
  # release to upload their assets into. Deleting + recreating keeps a single
  # `desktop-latest` entry pinned to the newest commit.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.id }}
    steps:
      - name: Ensure rolling release
        id: rel
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = 'desktop-latest';
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: data.id });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
            } catch (e) {
              if (e.status !== 404 && e.status !== 422) throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner, repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: 'Qiraa Desktop (latest)',
              body: 'Latest desktop installers built from master. Windows (.exe) and Linux (.deb / .AppImage) — see the assets below.',
              draft: false,
              prerelease: false,
            });
            core.setOutput('id', data.id);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
