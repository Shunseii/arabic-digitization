name: desktop-release

# Cut a versioned desktop release. Run by hand, picking a semver bump
# (patch/minor/major). The workflow bumps apps/desktop/package.json, commits it
# back to master, then builds the Electron installers for Windows + Linux with
# electron-builder and publishes them to BOTH:
#   - an immutable `desktop-v<X.Y.Z>` release (the version history), and
#   - the rolling `desktop-latest` release (always the newest build).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true
      notes:
        description: "Release notes (what changed in this version)"
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  # Bump the version in apps/desktop/package.json, commit it back to master, and
  # create the immutable `desktop-v<X.Y.Z>` release that the build jobs upload
  # into.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          # Use the default token so the bump commit can be pushed back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute and apply version bump
        id: bump
        run: |
          cd apps/desktop
          CUR=$(node -p "require('./package.json').version")
          NEW=$(node -e "
            const s = '${CUR}'.split('.').map(Number);
            const b = '${{ inputs.bump }}';
            if (b === 'major') { s[0]++; s[1] = 0; s[2] = 0; }
            else if (b === 'minor') { s[1]++; s[2] = 0; }
            else { s[2]++; }
            console.log(s.join('.'));
          ")
          echo "Bumping $CUR -> $NEW"
          jq --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json
          git commit -m "chore(desktop): release v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin master
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create versioned release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.bump.outputs.version }}';
            const notes = ${{ toJSON(inputs.notes) }};
            const body = [
              notes,
              '',
              '---',
              `Desktop installers for v${version}. Windows (.exe) and Linux (.deb / .AppImage) — see the assets below.`,
            ].join('\n');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `desktop-v${version}`,
              target_commitish: '${{ steps.commit.outputs.sha }}',
              name: `رقمنة — Desktop v${version}`,
              body,
              draft: false,
              prerelease: false,
            });

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            builder_flag: --linux
          - platform: windows-latest
            builder_flag: --win
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact bumped commit, not whatever master moved to.
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm --filter @qiraa/desktop build

      - name: Package with electron-builder
        env:
          # Don't let electron-builder try to publish or code-sign; we upload
          # the artifacts ourselves below.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --filter @qiraa/desktop exec electron-builder ${{ matrix.builder_flag }} --publish never

      - name: Upload installers to the versioned release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          shopt -s nullglob
          cd apps/desktop/release
          files=( *.AppImage *.deb *.exe )
          echo "Uploading: ${files[*]}"
          gh release upload "desktop-v$VERSION" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Mirror the freshly built installers onto the rolling `desktop-latest`
  # release so there is always a stable "newest build" download URL.
  publish-latest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Recreate desktop-latest from the versioned release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA: ${{ needs.prepare.outputs.sha }}
          NOTES: ${{ inputs.notes }}
        run: |
          mkdir -p latest-assets
          gh release download "desktop-v$VERSION" \
            --repo "$GITHUB_REPOSITORY" --dir latest-assets

          # Delete the old rolling release + its tag, then recreate at this commit.
          gh release delete desktop-latest \
            --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true

          gh release create desktop-latest latest-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SHA" \
            --title "رقمنة — Desktop (latest)" \
            --notes "$(printf '%s\n\n---\nLatest desktop installers (currently v%s). Windows (.exe) and Linux (.deb / .AppImage) — see the assets below.' "$NOTES" "$VERSION")"
